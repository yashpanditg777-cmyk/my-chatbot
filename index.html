<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI ChatBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #f1f5f9;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(139,92,246,0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    header {
      position: relative;
      z-index: 10;
      padding: 14px 20px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .bot-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(99,102,241,0.4);
    }
    .bot-name { font-weight: 700; font-size: 16px; color: #f1f5f9; }
    .bot-status { font-size: 11px; color: #10b981; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .clear-btn {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      display: none;
      transition: background 0.2s;
    }
    .clear-btn:hover { background: rgba(239,68,68,0.2); }
    #api-banner {
      position: relative;
      z-index: 10;
      background: rgba(245,158,11,0.1);
      border-bottom: 1px solid rgba(245,158,11,0.2);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }
    .api-banner-text { font-size: 12px; color: #fbbf24; display: flex; align-items: center; gap: 8px; }
    .api-input-row { display: flex; gap: 8px; flex: 1; max-width: 420px; }
    .api-input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 8px;
      padding: 6px 12px;
      color: #f1f5f9;
      font-size: 12px;
      font-family: monospace;
      outline: none;
    }
    .api-input:focus { border-color: rgba(245,158,11,0.6); }
    .api-save-btn {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      color: white;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 10px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 4px; }
    #empty-state {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      color: rgba(255,255,255,0.3);
    }
    #empty-state .emoji { font-size: 52px; }
    #empty-state h2 { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.5); }
    #empty-state p { font-size: 13px; }
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-bottom: 14px;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }
    .msg-avatar.bot { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .msg-avatar.user { background: linear-gradient(135deg, #ec4899, #f43f5e); }
    .msg-bubble {
      max-width: 72%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-bubble.bot {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px 18px 18px 4px;
      color: #e2e8f0;
    }
    .msg-bubble.user {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 18px 18px 4px 18px;
      color: white;
    }
    .typing-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 14px; }
    .typing-bubble {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px 18px 18px 4px;
      padding: 12px 16px;
      display: flex; gap: 5px; align-items: center;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #6366f1; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-5px); opacity: 1; } }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 10px;
    }
    #input-area {
      position: relative;
      z-index: 10;
      padding: 12px 16px 16px;
      border-top: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.02);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 11px 16px;
      color: #f1f5f9;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: rgba(99,102,241,0.5); }
    #user-input::placeholder { color: rgba(255,255,255,0.3); }
    #send-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #send-btn:not(:disabled):hover { transform: scale(1.05); }
    #send-btn:not(:disabled):active { transform: scale(0.95); }
    .hint { text-align: center; font-size: 11px; color: rgba(255,255,255,0.2); padding: 4px 0 0; }
    @media (max-width: 480px) {
      #api-banner { flex-direction: column; align-items: flex-start; }
      .api-input-row { max-width: 100%; width: 100%; }
      .msg-bubble { max-width: 82%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="bot-avatar">🤖</div>
      <div>
        <div class="bot-name">AI Assistant</div>
        <div class="bot-status"><div class="status-dot"></div> Online</div>
      </div>
    </div>
    <button class="clear-btn" id="clear-btn" onclick="clearChat()">🗑 Clear</button>
  </header>

  <div id="api-banner">
    <div class="api-banner-text">⚠️ Groq API Key daalo:</div>
    <div class="api-input-row">
      <input type="password" class="api-input" id="api-key-input" placeholder="gsk_..."/>
      <button class="api-save-btn" onclick="saveApiKey()">Save ✓</button>
    </div>
  </div>

  <div id="messages">
    <div id="empty-state">
      <div class="emoji">💬</div>
      <h2>Kuch bhi pooch!</h2>
      <p>Hindi ya English, dono chalega 😄</p>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Message likho..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>➤</button>
  </div>
  <div class="hint">Enter = Send &nbsp;|&nbsp; Shift+Enter = New Line</div>

  <script>
    let messages = [];
    let apiKey = localStorage.getItem('groq_api_key') || '';
    let isLoading = false;

    window.onload = () => {
      if (apiKey) {
        document.getElementById('api-banner').style.display = 'none';
        document.getElementById('send-btn').disabled = false;
      }
      document.getElementById('user-input').addEventListener('input', () => {
        const val = document.getElementById('user-input').value.trim();
        document.getElementById('send-btn').disabled = !val || !apiKey || isLoading;
      });
    };

    function saveApiKey() {
      const key = document.getElementById('api-key-input').value.trim();
      if (!key.startsWith('gsk_')) {
        alert('Sahi Groq API key daalo bhai! "gsk_" se shuru hoti hai.');
        return;
      }
      apiKey = key;
      localStorage.setItem('groq_api_key', key);
      document.getElementById('api-banner').style.display = 'none';
      document.getElementById('send-btn').disabled = false;
      alert('API Key save ho gayi! ✅ Ab chat karo!');
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function scrollBottom() {
      const el = document.getElementById('messages');
      el.scrollTop = el.scrollHeight;
    }

    function addMessage(role, content) {
      messages.push({ role, content });
      const container = document.getElementById('messages');
      const empty = document.getElementById('empty-state');
      if (empty) empty.remove();
      document.getElementById('clear-btn').style.display = 'block';

      const row = document.createElement('div');
      row.className = 'msg-row ' + role;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar ' + (role === 'user' ? 'user' : 'bot');
      avatar.textContent = role === 'user' ? '🧑' : '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble ' + (role === 'user' ? 'user' : 'bot');
      bubble.textContent = content;

      row.appendChild(avatar);
      row.appendChild(bubble);
      container.appendChild(row);
      scrollBottom();
    }

    function showTyping() {
      const container = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = 'typing-row';
      row.id = 'typing';
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar bot';
      avatar.textContent = '🤖';
      const bubble = document.createElement('div');
      bubble.className = 'typing-bubble';
      bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      row.appendChild(avatar);
      row.appendChild(bubble);
      container.appendChild(row);
      scrollBottom();
    }

    function hideTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    function showError(msg) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'error-msg';
      div.textContent = '⚠️ ' + msg;
      container.appendChild(div);
      scrollBottom();
    }

    function clearChat() {
      messages = [];
      const container = document.getElementById('messages');
      container.innerHTML = `
        <div id="empty-state">
          <div class="emoji">💬</div>
          <h2>Kuch bhi pooch!</h2>
          <p>Hindi ya English, dono chalega 😄</p>
        </div>`;
      document.getElementById('clear-btn').style.display = 'none';
    }

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text || isLoading || !apiKey) return;

      isLoading = true;
      document.getElementById('send-btn').disabled = true;
      input.value = '';
      input.style.height = 'auto';

      addMessage('user', text);
      showTyping();

      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + apiKey
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            max_tokens: 1000,
            messages: [
              { role: 'system', content: 'You are a helpful, friendly AI assistant. Be concise and clear. Respond in the same language the user writes in.' },
              ...messages.map(m => ({ role: m.role, content: m.content }))
            ]
          })
        });

        const data = await res.json();

        if (data.error) {
          hideTyping();
          showError(data.error.message || 'Kuch gadbad ho gayi!');
        } else {
          const reply = data?.choices?.[0]?.message?.content || 'Koi jawab nahi mila.';
          hideTyping();
          addMessage('assistant', reply);
        }
      } catch (err) {
        hideTyping();
        showError('Network error! Internet check karo aur dobara try karo.');
      } finally {
        isLoading = false;
        const val = document.getElementById('user-input').value.trim();
        document.getElementById('send-btn').disabled = !val || !apiKey;
        document.getElementById('user-input').focus();
      }
    }
  </script>
</body>
</html>
